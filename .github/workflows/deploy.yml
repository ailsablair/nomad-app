name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code onto the GitHub runner
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Install Node.js right inside GitHub Actions
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches a stable modern Node version

      # Step 3: Install dependencies and compile your app into the "dist" folder
      - name: Install dependencies and build app
        run: |
          npm install
          npm run build

      # Step 4: Log into IONOS quickly just to make sure the target folders exist
      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          script: mkdir -p ~/subdomains/apps/nomad/

      # Step 5: Securely upload the compiled production files using your SSH key
      - name: Copy production build to IONOS via SSH (SCP)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          source: "dist/**" # Change to "build/**" or "out/**" if your framework uses a different output folder name
          target: "~/subdomains/apps/nomad/"
          strip_components: 1 # Prevents creating an extra nested "dist" folder on the server
