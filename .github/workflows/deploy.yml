on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code onto the GitHub runner
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Install Node.js inside GitHub Actions
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install dependencies and compile your app locally
      - name: Install dependencies and build app
        run: |
          npm install
          npm run build

      # Step 4: Ensure the target directory structure exists on IONOS
      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IONOS_HOST_IP }}
          username: ${{ secrets.IONOS_SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: mkdir -p ~/subdomains/apps/nomad/

      # Step 5: Securely upload the compiled production files (dist) to IONOS
      - name: Copy production build to IONOS via SSH (SCP)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.IONOS_HOST_IP }}
          username: ${{ secrets.IONOS_SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/**"
          target: "~/subdomains/apps/nomad/"
          strip_components: 1
