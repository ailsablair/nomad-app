name: Build and Deploy Nomad App

on:
  push:
    branches:
      - main  # Triggers the workflow every time I push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Sync Files via SFTP to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_SFTP_SERVER }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          local-dir: ./dist/          # Uploads only the compiled contents of the dist folder
          server-dir: /subdomains/apps/nomad/  # Adjust this to match your target folder on IONOS
          dangerous-clean-slate: false  # Change to true if you want it to delete old files automatically
