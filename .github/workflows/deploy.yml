name: Build and Deploy Nomad App

on:
  push:
    branches:
      - main

jobs:
  # 1. Build locally on GitHub to verify code integrity
  build-github:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

  # 2. Trigger the deployment on IONOS via SSH
  deploy-ssh:
    needs: build-github
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to IONOS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IONOS_HOST_IP }}
          username: ${{ secrets.IONOS_SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Force the shell to load your profile settings so it can find npm
            source ~/.bash_profile || source ~/.profile || source ~/.bashrc

            # 2. Navigate to the correct folder relative to your home directory
            cd ~/subdomains/apps/nomad/

            # 3. Ensure we are on the latest code
            git pull origin main

            # 4. Install dependencies and build on the server
            npm install
            npm run build
