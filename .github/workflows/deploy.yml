name: Build and Deploy Nomad App

on:
  push:
    branches:
      - main  # Triggers the workflow every time I push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Sync Files via FTPS to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_SFTP_SERVER }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: ./dist/
          server-dir: /subdomains/apps/nomad/
          dangerous-clean-slate: false

name: Deploy via SSH

  on:
  push:
    branches:
      - main

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Deploy to IONOS via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.IONOS_HOST_IP }}
            username: ${{ secrets.IONOS_SSH_USERNAME }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            port: 22
            script: |
            cd /subdomains/apps/nomad/
            git pull origin main
            npm install
            npm run build
