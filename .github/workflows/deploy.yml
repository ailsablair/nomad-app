name: Build and Deploy Nomad App

on:
  push:
    branches:
      - main  # Triggers the workflow every time I push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build
- name: Sync Files via SFTP to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_SFTP_SERVER }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          protocol: ftps           # 👈 CHANGE THIS TO ftps
          port: 21                 # 👈 CHANGE PORT TO 21 (Standard for FTPS)
          local-dir: ./dist/
          server-dir: /subdomains/apps/nomad/
          dangerous-clean-slate: false
